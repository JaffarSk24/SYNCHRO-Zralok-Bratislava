name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Slovak build (synchrozralok.sk) → dist/
      - name: Build SK site
        run: npm run build

      # English build (synchrozralok.com) → dist-en/
      - name: Build EN site
        run: PUBLIC_LOCALE=en npx astro build --outDir dist-en

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Ensure both web roots exist before rsync
      - name: Ensure remote dirs
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}' '${{ secrets.DEPLOY_PATH_EN }}'"

      - name: Deploy SK (synchrozralok.sk)
        run: |
          rsync -az --delete \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy EN (synchrozralok.com)
        run: |
          rsync -az --delete \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            dist-en/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH_EN }}/"

      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "chown -R www-data:www-data '${{ secrets.DEPLOY_PATH }}' '${{ secrets.DEPLOY_PATH_EN }}'"
