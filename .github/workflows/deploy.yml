name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Slovak build (synchrozralok.sk) → dist/
      - name: Build SK site
        run: npm run build

      # English build (synchrozralok.com) → dist-en/
      - name: Build EN site
        run: PUBLIC_LOCALE=en npx astro build --outDir dist-en

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Ensure both web roots exist before rsync
      - name: Ensure remote dirs
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}' '${{ secrets.DEPLOY_PATH_EN }}'"

      - name: Deploy SK (synchrozralok.sk)
        run: |
          rsync -az --delete \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy EN (synchrozralok.com)
        run: |
          rsync -az --delete \
            --exclude='.well-known' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            dist-en/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH_EN }}/"

      # Form API (PHP) lives outside the static roots; keep it in sync too.
      # No --delete: never touch anything else in that dir.
      - name: Deploy form API (php)
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH_API }}'"
          rsync -az \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            server/api/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH_API }}/"

      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "chown -R www-data:www-data '${{ secrets.DEPLOY_PATH }}' '${{ secrets.DEPLOY_PATH_EN }}' '${{ secrets.DEPLOY_PATH_API }}'"

      # Notify IndexNow (Bing, Seznam, Yandex) instantly after each deploy.
      # Keys are public by design — each is hosted at /<key>.txt on its own host.
      - name: Ping IndexNow
        run: |
          indexnow() {
            curl -s -m 20 -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"$1\",\"key\":\"$2\",\"keyLocation\":\"https://$1/$2.txt\",\"urlList\":[\"https://$1/\"]}" \
              -o /dev/null -w "IndexNow $1 -> HTTP %{http_code}\n" || true
          }
          indexnow synchrozralok.sk  ea3e301dd59d4abf9896e0fc921fc3eb
          indexnow synchrozralok.com 259d8e90be0549278a596d0f0b872fa6

      # Second channel: Bing Webmaster API (SubmitUrlBatch). The API key is secret
      # (GitHub secret, never committed). Submits each site's pages for indexing.
      - name: Submit URLs to Bing
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
        run: |
          if [ -z "$BING_API_KEY" ]; then echo "BING_API_KEY not set — skipping"; exit 0; fi
          bing() {
            curl -s -m 30 -X POST "https://ssl.bing.com/webmaster/api.svc/json/SubmitUrlBatch?apikey=$BING_API_KEY" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"siteUrl\":\"https://$1\",\"urlList\":[\"https://$1/\"]}" \
              -w "Bing $1 -> HTTP %{http_code}\n" || true
            echo
          }
          bing synchrozralok.sk
          bing synchrozralok.com
